name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax check (npm run check)
        run: npm run check
      - name: Generate frontend-config (build smoke)
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: anon-test-key-for-ci-smoke-only
        run: npm run build
