<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Start Innova</title>
    <meta name="description" content="Đăng nhập hệ thống thành viên Start Innova (UEH-ISB).">
    <link rel="icon" type="image/png" href="startinnova%20(9).png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #ffffff;
            overflow-x: hidden;
        }
        .glow-hover {
            transition: all 0.3s ease;
        }
        .glow-hover:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.7), 0 0 50px rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="antialiased selection:bg-purple-500 selection:text-white min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Decorative Gradients -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-purple-600/20 rounded-full blur-[100px] -z-10"></div>

    <div class="w-full max-w-md px-6 py-12">
        <!-- Back to Home -->
        <a href="index.html" class="inline-flex items-center text-gray-400 hover:text-white transition-colors mb-8 text-sm font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Quay lại trang chủ
        </a>

        <!-- Form Container -->
        <div class="bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] rounded-3xl p-8 shadow-2xl">
            <!-- Logos -->
            <div class="flex justify-center items-center gap-5 mb-8">
                <img src="startinnova (9).png" alt="Start Innova Logo" style="height: 50px;" class="w-auto object-contain opacity-90" onerror="this.src='https://placehold.co/200x50/0A0A0A/FFFFFF?text=STARTINNOVA'"/>
                <div class="h-8 w-px bg-white/20"></div>
                <img src="UEH-ISB.png" alt="UEH ISB Logo" style="height: 36px;" class="w-auto object-contain opacity-90" onerror="this.src='https://placehold.co/120x42/FFFFFF/000000?text=UEH+ISB'"/>
            </div>

            <h2 class="text-2xl font-bold text-center mb-2">Đăng nhập Hệ thống</h2>
            <p class="text-gray-400 text-center mb-8 text-sm">Chào mừng bạn quay trở lại Start Innova</p>

            <form id="login-form" action="#" method="POST" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email (UEH-ISB)</label>
                    <input type="email" id="email" class="w-full px-5 py-3.5 rounded-xl bg-black/50 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="mssv@student.ueh.edu.vn" required>
                </div>
                
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-sm font-medium text-gray-300">Mật khẩu</label>
                        <a href="#" class="text-sm text-blue-400 hover:text-blue-300 transition-colors">Quên mật khẩu?</a>
                    </div>
                    <input type="password" id="password" class="w-full px-5 py-3.5 rounded-xl bg-black/50 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="••••••••" required>
                </div>

                <div id="auth-message" hidden aria-live="polite"></div>

                <div class="pt-2">
                    <button id="login-submit" type="submit" class="w-full py-4 font-bold text-white bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl glow-hover shadow-[0_0_15px_rgba(37,99,235,0.3)]">
                        Đăng nhập
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-400">
                    Chưa có tài khoản? 
                    <a href="register.html" class="text-blue-400 font-medium hover:text-blue-300 transition-colors">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="frontend-config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth-pages.js"></script>
</body>
</html>
