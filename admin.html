<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị người dùng - Start Innova</title>
    <meta name="description" content="Quản lý thành viên và vai trò Start Innova.">
    <link rel="icon" type="image/png" href="startinnova%20(9).png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #ffffff;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-purple-500 selection:text-white">
    <header class="border-b border-white/10 bg-[#0A0A0A]/90">
        <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <a href="dashboard.html" class="flex items-center gap-4">
                <img src="startinnova (9).png" alt="Start Innova Logo" class="h-12 w-auto object-contain">
                <span class="hidden text-sm font-semibold text-gray-300 sm:inline">Quản trị user</span>
            </a>
            <div class="flex flex-wrap items-center gap-2 sm:gap-3">
                <a href="admin-content.html" class="rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm font-semibold text-white transition-colors hover:bg-white/10 sm:px-4">Nội dung trang</a>
                <a href="dashboard.html" class="rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm font-semibold text-white transition-colors hover:bg-white/10 sm:px-4">Dashboard</a>
                <button id="logout-button" type="button" class="rounded-lg bg-white/10 px-3 py-2 text-sm font-semibold text-white transition-colors hover:bg-white/15 sm:px-4">Đăng xuất</button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-6 flex flex-col justify-between gap-4 sm:flex-row sm:items-end">
            <div>
                <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-300">Quản trị</p>
                <h1 class="mt-2 text-3xl font-bold text-white">Người dùng</h1>
            </div>
            <div class="rounded-xl border border-white/10 bg-white/[0.03] px-4 py-3 text-sm text-gray-300">
                Tổng số: <span id="users-total" class="font-bold text-white">-</span>
            </div>
        </div>

        <div id="admin-message" hidden class="mb-6"></div>

        <section class="overflow-hidden rounded-2xl border border-white/10 bg-white/[0.03]">
            <div class="overflow-x-auto">
                <table class="min-w-full border-collapse">
                    <thead class="bg-white/[0.04] text-left text-xs uppercase tracking-[0.16em] text-gray-400">
                        <tr>
                            <th class="px-4 py-3 font-semibold">Email</th>
                            <th class="px-4 py-3 font-semibold">Họ tên</th>
                            <th class="px-4 py-3 font-semibold">MSSV</th>
                            <th class="px-4 py-3 font-semibold">Ban</th>
                            <th class="px-4 py-3 font-semibold">Vai trò</th>
                            <th class="px-4 py-3 font-semibold">Trạng thái</th>
                            <th class="px-4 py-3 font-semibold">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-white/10">
                        <tr>
                            <td colspan="7" class="px-4 py-6 text-sm text-gray-400">Đang tải…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="frontend-config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
